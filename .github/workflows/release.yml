name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-artifacts:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_name: bibr
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            binary_name: bibr
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary_name: bibr.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/
          archive="bibr-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive_ext }}"
          tar -C dist -czf "$archive" ${{ matrix.binary_name }}
          shasum -a 256 "$archive" > "$archive.sha256"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.binary_name }}"
          $archive = "bibr-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive_ext }}"
          Compress-Archive -Path "dist/${{ matrix.binary_name }}" -DestinationPath $archive -Force
          (Get-FileHash $archive -Algorithm SHA256).Hash.ToLower() + "  " + $archive | Out-File -Encoding ascii "$archive.sha256"

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bibr-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive_ext }}
            bibr-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive_ext }}.sha256
